<!-- 로그인 페이지 -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 에브리타임</title>
    <link rel="stylesheet" href="../css/login.css"/>
</head>
<body>
    <div class="page">
        <div class="container">
            <img src="../img/logo.png" alt="로고" class="logo_img"/>
            <form class="input_userInfo">
                <input name="id" class="input_id" type="text" placeholder="아이디" />
                <input name="password" class="input_pw" type="password" placeholder="비밀번호" />
                <button type="button" class="login_btn">에브리타임 로그인</button>
                <div class="options">
                    <label class="keep"><input type="checkbox"> 로그인 유지</label>
                    <p class="find">아이디/비밀번호 찾기</p>
                </div>
                <p class="register">회원가입</p>
            </form>
            <footer>
                <p>이용약관</p>
                <p><strong>개인정보처리방침</strong></p>
                <p>문의하기</p>
                <p><strong>&copy; 에브리타임</strong></p>
            </footer>
        </div>
    </div>
    <script src="../js/login.js" defer></script>
</body>
</html>
